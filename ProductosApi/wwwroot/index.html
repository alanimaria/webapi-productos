<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestión de Productos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 30px; }
    h1 { text-align: center; margin-bottom: 30px; color: #333; }
    .container { max-width: 900px; margin: auto; }

    form { background: white; padding: 20px; border-radius: 8px;
           box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 30px; }
    form h2 { margin-bottom: 15px; color: #444; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    input { width: 100%; padding: 8px 12px; border: 1px solid #ccc;
            border-radius: 6px; font-size: 14px; }
    .btn-group { grid-column: span 2; display: flex; gap: 10px; margin-top: 5px; }
    button { padding: 9px 20px; border: none; border-radius: 6px;
             cursor: pointer; font-size: 14px; }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-secondary { background: #6b7280; color: white; }
    .btn-edit { background: #f59e0b; color: white; font-size: 12px; padding: 5px 10px; }
    .btn-delete { background: #ef4444; color: white; font-size: 12px; padding: 5px 10px; }

    table { width: 100%; border-collapse: collapse; background: white;
            border-radius: 8px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    th { background: #4f46e5; color: white; padding: 12px; text-align: left; }
    td { padding: 11px 12px; border-bottom: 1px solid #e5e7eb; }
    tr:hover { background: #f9fafb; }

    #mensaje { margin-bottom: 15px; padding: 10px 15px; border-radius: 6px;
               display: none; font-size: 14px; }
    .error { background: #fee2e2; color: #b91c1c; display: block !important; }
    .success { background: #d1fae5; color: #065f46; display: block !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gestión de Productos</h1>

    <div id="mensaje"></div>

    <form id="formProducto">
      <h2 id="formTitulo">Nuevo Producto</h2>
      <div class="form-grid">
        <input id="nombre"    type="text"   placeholder="Nombre"    required />
        <input id="categoria" type="text"   placeholder="Categoría" required />
        <input id="precio"    type="number" placeholder="Precio"    step="0.01" required />
        <input id="stock"     type="number" placeholder="Stock"     required />
        <div class="btn-group">
          <button type="submit" class="btn-primary"> Guardar</button>
          <button type="button" class="btn-secondary" onclick="cancelarEdicion()"> Cancelar</button>
        </div>
      </div>
    </form>

    <table>
      <thead>
        <tr>
          <th>ID</th><th>Nombre</th><th>Precio</th>
          <th>Stock</th><th>Categoría</th><th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaProductos">
        <tr><td colspan="6">Cargando...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const BASE_URL = 'http://localhost:5283/api';
    let editandoId = null;

    // ── Utilidad fetch ──────────────────────────────────
    async function apiFetch(endpoint, options = {}) {
      const config = {
        headers: { 'Content-Type': 'application/json' },
        ...options
      };
      const res = await fetch(`${BASE_URL}${endpoint}`, config);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message ?? `HTTP ${res.status}`);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    // ── Mostrar mensaje ─────────────────────────────────
    function mostrarMensaje(texto, tipo) {
      const el = document.getElementById('mensaje');
      el.textContent = texto;
      el.className = tipo;
      setTimeout(() => { el.className = ''; el.style.display = 'none'; }, 3000);
    }

    // ── Renderizar tabla ────────────────────────────────
    async function renderTabla() {
      const tabla = document.getElementById('tablaProductos');
      tabla.innerHTML = '<tr><td colspan="6">Cargando...</td></tr>';
      try {
        const productos = await apiFetch('/productos');
        tabla.innerHTML = productos.map(p => `
          <tr>
            <td>${p.id}</td>
            <td>${p.nombre}</td>
            <td>$${p.precio.toFixed(2)}</td>
            <td>${p.stock}</td>
            <td>${p.categoria}</td>
            <td>
              <button class="btn-edit"   onclick="cargarEdicion(${p.id})"> Editar</button>
              <button class="btn-delete" onclick="borrar(${p.id})"> Eliminar</button>
            </td>
          </tr>
        `).join('');
      } catch (e) {
        tabla.innerHTML = `<tr><td colspan="6" style="color:red"> ${e.message}</td></tr>`;
        mostrarMensaje(e.message, 'error');
      }
    }

    // ── Formulario: crear o actualizar ──────────────────
    document.getElementById('formProducto').addEventListener('submit', async (e) => {
      e.preventDefault();
      const datos = {
        nombre:    document.getElementById('nombre').value,
        precio:    +document.getElementById('precio').value,
        stock:     +document.getElementById('stock').value,
        categoria: document.getElementById('categoria').value
      };
      try {
        if (editandoId) {
          await apiFetch(`/productos/${editandoId}`, { method: 'PUT', body: JSON.stringify(datos) });
          mostrarMensaje('Producto actualizado correctamente ', 'success');
          cancelarEdicion();
        } else {
          await apiFetch('/productos', { method: 'POST', body: JSON.stringify(datos) });
          mostrarMensaje('Producto creado correctamente ', 'success');
        }
        e.target.reset();
        await renderTabla();
      } catch (err) {
        mostrarMensaje(`Error: ${err.message}`, 'error');
      }
    });

    // ── Cargar edición ──────────────────────────────────
    async function cargarEdicion(id) {
      try {
        const p = await apiFetch(`/productos/${id}`);
        editandoId = id;
        document.getElementById('nombre').value    = p.nombre;
        document.getElementById('precio').value    = p.precio;
        document.getElementById('stock').value     = p.stock;
        document.getElementById('categoria').value = p.categoria;
        document.getElementById('formTitulo').textContent = ` Editando Producto #${id}`;
      } catch (e) {
        mostrarMensaje(`Error al cargar: ${e.message}`, 'error');
      }
    }

    // ── Cancelar edición ────────────────────────────────
    function cancelarEdicion() {
      editandoId = null;
      document.getElementById('formProducto').reset();
      document.getElementById('formTitulo').textContent = 'Nuevo Producto';
    }

    // ── Eliminar ────────────────────────────────────────
    async function borrar(id) {
      if (!confirm(`¿Eliminar producto #${id}?`)) return;
      try {
        await apiFetch(`/productos/${id}`, { method: 'DELETE' });
        mostrarMensaje('Producto eliminado ', 'success');
        await renderTabla();
      } catch (e) {
        mostrarMensaje(`Error: ${e.message}`, 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', renderTabla);
  </script>
</body>
</html>
